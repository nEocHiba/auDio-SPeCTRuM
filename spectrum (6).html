<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectrum Visualizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #121212; color: #fff;
    font-family: -apple-system, "Helvetica Neue", sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
  }
  #app { width: min(720px, 100%); }
  #now-playing {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 2rem; padding: 16px;
    background: #1a1a1a; border-radius: 12px;
  }
  #album-art {
    width: 56px; height: 56px; border-radius: 6px;
    background: #282828; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; overflow: hidden;
  }
  #album-art img { width: 100%; height: 100%; object-fit: cover; display: none; }
  #track-info { flex: 1; min-width: 0; }
  #track-name { font-size: 15px; font-weight: 600; color: #535353; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #artist-name { font-size: 13px; color: #535353; margin-top: 3px; }
  #connect-spotify {
    font-size: 12px; color: #1db954; cursor: pointer;
    background: transparent; border: 1px solid #1db954;
    padding: 6px 14px; border-radius: 20px; white-space: nowrap; transition: all 0.15s;
  }
  #connect-spotify:hover { background: #1db954; color: #000; }
  #canvas-wrap { width: 100%; height: 340px; }
  canvas { width: 100%; height: 100%; display: block; }
  #freq-labels { display: flex; justify-content: space-between; padding: 4px 2px 0; }
  #freq-labels span { font-size: 11px; color: #535353; }
  #controls { display: flex; align-items: center; gap: 12px; margin-top: 1.5rem; flex-wrap: wrap; }
  select {
    background: #282828; color: #b3b3b3; border: 1px solid #333;
    padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; flex: 1;
  }
  #start-btn {
    background: #1db954; color: #000; border: none;
    padding: 10px 24px; border-radius: 24px; font-size: 13px;
    font-weight: 700; cursor: pointer; transition: all 0.15s;
  }
  #start-btn:hover { background: #1ed760; }
  #start-btn.active { background: #fff; }
  .ctrl { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #535353; }
  input[type=range] { width: 80px; accent-color: #1db954; cursor: pointer; }
  #status { font-size: 12px; color: #535353; margin-top: 1rem; text-align: center; }
  #spotify-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 100;
  }
  #spotify-modal.open { display: flex; }
  #modal-box { background: #282828; border-radius: 12px; padding: 2rem; width: min(400px, 90vw); }
  #modal-box h2 { font-size: 18px; margin-bottom: 0.5rem; }
  #modal-box p { font-size: 13px; color: #b3b3b3; margin-bottom: 1.5rem; line-height: 1.6; }
  #modal-box input {
    width: 100%; background: #333; border: 1px solid #444; color: #fff;
    padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 0.75rem;
  }
  #modal-box input:focus { outline: none; border-color: #1db954; }
  #modal-box input::placeholder { color: #535353; }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
  .modal-btns button { padding: 8px 20px; border-radius: 20px; font-size: 13px; cursor: pointer; border: none; }
  #modal-cancel { background: transparent; color: #b3b3b3; border: 1px solid #535353; }
  #modal-ok { background: #1db954; color: #000; font-weight: 700; }
</style>
</head>
<body>
<div id="app">
  <div id="now-playing">
    <div id="album-art">
      <img id="album-img" src="" alt="">
      <svg id="album-placeholder" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="3" width="18" height="18" rx="2" fill="#333"/>
        <path d="M9 8l8 4-8 4V8z" fill="#535353"/>
      </svg>
    </div>
    <div id="track-info">
      <div id="track-name">-</div>
      <div id="artist-name">Spotifyと連携すると表示されます</div>
    </div>
    <button id="connect-spotify">Spotifyと連携</button>
  </div>

  <div id="canvas-wrap"><canvas id="viz"></canvas></div>
  <div id="freq-labels">
    <span>10Hz</span><span>100Hz</span><span>500Hz</span><span>1kHz</span><span>5kHz</span><span>20kHz</span>
  </div>

  <div id="controls">
    <select id="device-select"><option value="__default__">入力デバイス（許可後に読み込み）</option></select>
    <button id="start-btn">開始</button>
    <div class="ctrl">感度 <input type="range" id="gain" min="0.2" max="3" step="0.05" value="0.8"></div>
    <div class="ctrl">バー数 <input type="range" id="barcount" min="16" max="128" step="8" value="64"></div>
  </div>
  <p id="status">「開始」を押してマイクを許可してください</p>
</div>

<div id="spotify-modal">
  <div id="modal-box">
    <h2>Spotifyと連携</h2>
    <p>Spotify APIのClient IDを入力してください。<br>
    <a href="https://developer.spotify.com/dashboard" target="_blank" style="color:#1db954">developer.spotify.com</a> で無料取得できます。</p>
    <input id="client-id-input" type="text" placeholder="Client ID を貼り付け">
    <div class="modal-btns">
      <button id="modal-cancel">キャンセル</button>
      <button id="modal-ok">認証する</button>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('viz');
  const ctx = canvas.getContext('2d');
  const btn = document.getElementById('start-btn');
  const status = document.getElementById('status');
  const gainSlider = document.getElementById('gain');
  const barSlider = document.getElementById('barcount');
  const sel = document.getElementById('device-select');

  let analyser, animId, running = false, peaks = [], peaksBottom = [];

  function resize() {
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  async function loadDevices() {
    try {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const inputs = devices.filter(d => d.kind === 'audioinput');
      sel.innerHTML = '';
      if (inputs.length === 0) { sel.innerHTML = '<option value="__default__">デバイスなし</option>'; return; }
      let bhIdx = -1;
      inputs.forEach((d, i) => {
        const opt = document.createElement('option');
        opt.value = d.deviceId || '__default__';
        opt.textContent = d.label || ('入力デバイス ' + (i + 1));
        if (d.label && d.label.toLowerCase().includes('blackhole')) bhIdx = i;
        sel.appendChild(opt);
      });
      if (bhIdx >= 0) sel.selectedIndex = bhIdx;
      else sel.selectedIndex = 0;
    } catch(e) { console.error(e); }
  }

  function roundedBar(x, y, w, h, r, upward) {
    if (h < 2) return;
    const minH = r * 2;
    if (h < minH) r = h / 2;
    ctx.beginPath();
    if (upward) {
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h);
      ctx.lineTo(x, y + h);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
    } else {
      ctx.moveTo(x, y);
      ctx.lineTo(x + w, y);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();
  }

  function draw() {
    animId = requestAnimationFrame(draw);
    const barCount = parseInt(barSlider.value);
    if (peaks.length !== barCount) {
      peaks = new Array(barCount).fill(0);
      peaksBottom = new Array(barCount).fill(0);
    }
    analyser.fftSize = Math.max(512, barCount * 8);
    const bufLen = analyser.frequencyBinCount;
    const data = new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);

    const W = canvas.width, H = canvas.height;
    const midY = H / 2;
    ctx.clearRect(0, 0, W, H);

    const gain = parseFloat(gainSlider.value);
    const gap = 2;
    const barW = Math.max(2, (W - gap * (barCount - 1)) / barCount);
    const radius = Math.min(barW / 2, 5);
    const sampleRate = analyser.context.sampleRate;
    const freqPerBin = sampleRate / analyser.fftSize;
    const minFreq = 10, maxFreq = 20000;
    const color = 'rgba(29,185,84,0.85)';
    const peakColor = 'rgba(29,185,84,1)';

    for (let i = 0; i < barCount; i++) {
      const freq = minFreq * Math.pow(maxFreq / minFreq, i / (barCount - 1));
      const binIdx = Math.min(bufLen - 1, Math.round(freq / freqPerBin));
      const raw = data[binIdx] / 255;
      const amp = Math.min(1, raw * gain);
      const barH = Math.max(3, amp * midY);
      const x = i * (barW + gap);

      ctx.fillStyle = color;
      roundedBar(x, midY - barH, barW, barH, radius, true);
      roundedBar(x, midY, barW, barH, radius, false);

      if (amp * midY > peaks[i]) peaks[i] = amp * midY;
      else peaks[i] = Math.max(0, peaks[i] - 1.5);
      if (peaks[i] > 5) {
        ctx.fillStyle = peakColor;
        ctx.beginPath();
        ctx.roundRect(x, midY - peaks[i] - 3, barW, 3, 1.5);
        ctx.fill();
        ctx.beginPath();
        ctx.roundRect(x, midY + peaks[i], barW, 3, 1.5);
        ctx.fill();
      }
    }
  }

  async function start() {
    try {
      const deviceId = sel.value;
      const constraints = (!deviceId || deviceId === '__default__')
        ? { audio: true, video: false }
        : { audio: { deviceId: { exact: deviceId } }, video: false };
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      await loadDevices();
      const ac = new AudioContext();
      const source = ac.createMediaStreamSource(stream);
      analyser = ac.createAnalyser();
      analyser.smoothingTimeConstant = 0.82;
      source.connect(analyser);
      running = true;
      btn.textContent = '停止';
      btn.classList.add('active');
      const label = sel.options[sel.selectedIndex] ? sel.options[sel.selectedIndex].textContent : 'デバイス';
      status.textContent = label + ' から受信中...';
      draw();
    } catch(e) {
      status.textContent = 'エラー: ' + e.message;
    }
  }

  function stop() {
    cancelAnimationFrame(animId);
    running = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    btn.textContent = '開始';
    btn.classList.remove('active');
    status.textContent = '停止しました';
  }

  btn.addEventListener('click', () => running ? stop() : start());
  sel.addEventListener('change', async () => { if (running) { stop(); await start(); } });

  navigator.mediaDevices.enumerateDevices().then(devices => {
    if (devices.filter(d => d.kind === 'audioinput' && d.label).length > 0) loadDevices();
  });

  // Spotify
  const modal = document.getElementById('spotify-modal');
  document.getElementById('connect-spotify').addEventListener('click', () => {
    const saved = localStorage.getItem('spotify_client_id');
    if (saved) document.getElementById('client-id-input').value = saved;
    modal.classList.add('open');
  });
  document.getElementById('modal-cancel').addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
  document.getElementById('modal-ok').addEventListener('click', () => {
    const clientId = document.getElementById('client-id-input').value.trim();
    if (!clientId) return;
    localStorage.setItem('spotify_client_id', clientId);
    modal.classList.remove('open');
    const redirectUri = location.href.split('?')[0].split('#')[0];
    location.href = `https://accounts.spotify.com/authorize?client_id=${clientId}&response_type=token&redirect_uri=${encodeURIComponent(redirectUri)}&scope=user-read-currently-playing%20user-read-playback-state`;
  });

  async function fetchNowPlaying(token) {
    try {
      const res = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
        headers: { Authorization: 'Bearer ' + token }
      });
      if (res.status === 204 || res.status === 401) return null;
      return await res.json();
    } catch { return null; }
  }

  function updateTrackUI(data) {
    if (!data || !data.item) return;
    const t = data.item;
    const tn = document.getElementById('track-name');
    const an = document.getElementById('artist-name');
    tn.textContent = t.name; tn.style.color = '#fff';
    an.textContent = t.artists.map(a => a.name).join(', '); an.style.color = '#b3b3b3';
    const img = document.getElementById('album-img');
    if (t.album.images[0]) {
      img.src = t.album.images[0].url;
      img.style.display = 'block';
      document.getElementById('album-placeholder').style.display = 'none';
    }
    document.getElementById('connect-spotify').textContent = '連携済み';
  }

  const hash = new URLSearchParams(location.hash.substring(1));
  const token = hash.get('access_token');
  if (token) {
    location.hash = '';
    localStorage.setItem('spotify_token', token);
    fetchNowPlaying(token).then(updateTrackUI);
    setInterval(() => fetchNowPlaying(token).then(updateTrackUI), 5000);
  } else {
    const saved = localStorage.getItem('spotify_token');
    if (saved) fetchNowPlaying(saved).then(d => {
      if (d) { updateTrackUI(d); setInterval(() => fetchNowPlaying(saved).then(updateTrackUI), 5000); }
    });
  }
})();
</script>
</body>
</html>
